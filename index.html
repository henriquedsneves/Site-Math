<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Calculadora Binomial Avançada</title>
<style>
    body { font-family: Arial; text-align: center; background: #f4f4f4; }
    input, select, button { padding: 8px; margin: 5px; }
    .box { margin: 15px; }
</style>
</head>
<body>

<h1> Calculadora Binomial</h1>

<select id="opcao" onchange="mudarCampos()">
    <option value="1">Combinação </option>
    <option value="4">Expansão </option>
    <option value="5">Termo Geral</option>
    <option value="6">Probabilidade</option>
</select>

<div id="formula" class="box"></div>
<div id="inputs" class="box"></div>

<button onclick="calcular()">Calcular</button>

<h2 id="saida"></h2>

<script>

function sup(num){
    const mapa = {
        "0":"⁰","1":"¹","2":"²","3":"³","4":"⁴",
        "5":"⁵","6":"⁶","7":"⁷","8":"⁸","9":"⁹"
    };
    return num.toString().split("").map(n => mapa[n]).join("");
}
function combinacao(n,k){
    let res = 1;
    for(let i=1;i<=k;i++){
        res = res*(n-i+1)/i;
    }
    return res;
}

// 🔄 Atualiza campos
function mudarCampos(){
    let op = document.getElementById("opcao").value;
    let f = document.getElementById("formula");
    let div = document.getElementById("inputs");

    if(op==1){
        
        div.innerHTML = `
        n: <input id="n">
        k: <input id="k">
        Resultado: <input id="res">
        `;
    }

    if(op==2){
      
        div.innerHTML = `n: <input id="n">`;
    }

    if(op==3){
       
        div.innerHTML = `n: <input id="n">`;
    }

    if(op==4){
        
        div.innerHTML = `
        a: <input id="a">
        b: <input id="b">
        n: <input id="n">
        `;
    }

    if(op==5){
       
        div.innerHTML = `
        n: <input id="n">
        k: <input id="k">
        a: <input id="a">
        b: <input id="b">
        T: <input id="T">
        `;
    }

    if(op==6){
       
        div.innerHTML = `
        n: <input id="n">
        k: <input id="k">
        P: <input id="P">
        `;
    }
}function mudarCampos(){
    let op = document.getElementById("opcao").value;
    let f = document.getElementById("formula");
    let div = document.getElementById("inputs");

    if(op==1){
        f.innerHTML = "";
        div.innerHTML = `
        n: <input id="n">
        k: <input id="k">
        `;
    }

    if(op==4){
        f.innerHTML = "";
        div.innerHTML = `
        a: <input id="a">
        b: <input id="b">
        n: <input id="n">
        `;
    }

    if(op==5){
        f.innerHTML = "";
        div.innerHTML = `
        n: <input id="n">
        k: <input id="k">
        a: <input id="a">
        b: <input id="b">
        `;
    }

    if(op==6){
        f.innerHTML = "";
        div.innerHTML = `
        n: <input id="n">
        k: <input id="k">
        `;
    }
}

// 🚀 Cálculo inteligente
function calcular(){
    let op = document.getElementById("opcao").value;
    let out = document.getElementById("saida");

    try{

    // 🔺 COMBINAÇÃO + PASCAL
    if(op==1){
        let n = Number(document.getElementById("n").value);
        let k = Number(document.getElementById("k").value);

        let tri = [];

        for(let i=0;i<=n;i++){
            let linha=[];
            for(let j=0;j<=i;j++){
                if(j==0||j==i) linha.push(1);
                else linha.push(tri[i-1][j-1]+tri[i-1][j]);
            }
            tri.push(linha);
        }

        let html = "<h3>🔺 Triângulo de Pascal</h3>";

        for(let i=0;i<tri.length;i++){
            html += `<div style="text-align:center;">`;
            for(let j=0;j<tri[i].length;j++){
                html += `<span style="display:inline-block;width:40px;font-weight:bold;">${tri[i][j]}</span>`;
            }
            html += `</div>`;
        }

        html += `<h3>📊 Resultado</h3>
        C(${n},${k}) = ${combinacao(n,k)}`;

        html += `
        <h3>🧠 Explicação</h3>
        Usamos combinação porque a ordem não importa.<br><br>
        C(${n},${k}) = ${n}! / (${k}!(${n-k})!)
        `;

        out.innerHTML = html;
    }

    // 📐 EXPANSÃO
    if(op==4){
        let a = Number(document.getElementById("a").value);
        let b = Number(document.getElementById("b").value);
        let n = Number(document.getElementById("n").value);

        let tri = [];

        for(let i=0;i<=n;i++){
            let linha=[];
            for(let j=0;j<=i;j++){
                if(j==0||j==i) linha.push(1);
                else linha.push(tri[i-1][j-1]+tri[i-1][j]);
            }
            tri.push(linha);
        }

        let html = "<h3>🔺 Triângulo de Pascal</h3>";

        for(let i=0;i<tri.length;i++){
            html += `<div style="text-align:center;">`;
            for(let j=0;j<tri[i].length;j++){
                let cor = (i==n) ? "#ffcc00" : "black";
                html += `<span style="display:inline-block;width:40px;color:${cor};font-weight:bold;">${tri[i][j]}</span>`;
            }
            html += `</div>`;
        }

        let termos=[];

        for(let k=0;k<=n;k++){
            let coef = tri[n][k]*(a**(n-k))*(b**k);
            let exp = n-k;

            if(exp>1) termos.push(coef+"x"+sup(exp));
            else if(exp==1) termos.push(coef+"x");
            else termos.push(coef);
        }

        html += `<h3>📐 Expansão</h3>${termos.join(" + ")}`;

        html += `
        <h3>🧠 Explicação</h3>
        Linha usada: ${tri[n].join(", ")}
        `;

        out.innerHTML = html;
    }

    // 🎯 TERMO GERAL
    if(op==5){
        let n = Number(document.getElementById("n").value);
        let k = Number(document.getElementById("k").value);
        let a = Number(document.getElementById("a").value);
        let b = Number(document.getElementById("b").value);

        let coef = combinacao(n,k)*(a**(n-k))*(b**k);
        let exp = n-k;

        let resultado = exp>1 ? coef+"x"+sup(exp) :
                        exp==1 ? coef+"x" : coef;

        out.innerHTML = `
        <h3>🎯 Termo Geral</h3>
        Resultado: ${resultado}

        <h3>🧠 Explicação</h3>
        T = C(${n},${k}) · ${a}<sup>${n-k}</sup> · ${b}<sup>${k}</sup>
        `;
    }

    // 📊 PROBABILIDADE
    if(op==6){
        let n = Number(document.getElementById("n").value);
        let k = Number(document.getElementById("k").value);

        let prob = combinacao(n,k)*(0.5**n)*100;

        out.innerHTML = `
        <h3>📊 Resultado</h3>
        P = ${prob.toFixed(2)}%

        <h3>🧠 Explicação</h3>
        P = C(${n},${k}) · (1/2)<sup>${n}</sup>
        `;
    }

    } catch(e){
        out.innerHTML = "Erro nos dados!";
    }
}
mudarCampos();
</script>

</body>
</html>
