<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Calculadora Binomial Avançada</title>
<style>
    body { font-family: Arial; text-align: center; background: #f4f4f4; }
    input, select, button { padding: 8px; margin: 5px; }
    .box { margin: 15px; }
</style>
</head>
<body>

<h1> Calculadora Binomial</h1>

<select id="opcao" onchange="mudarCampos()">
    <option value="1">Combinação </option>
    <option value="4">Expansão </option>
    <option value="5">Termo Geral</option>
    <option value="6">Probabilidade</option>
</select>

<div id="formula" class="box"></div>
<div id="inputs" class="box"></div>

<button onclick="calcular()">Calcular</button>

<h2 id="saida"></h2>

<script>

function sup(num){
    const mapa = {
        "0":"⁰","1":"¹","2":"²","3":"³","4":"⁴",
        "5":"⁵","6":"⁶","7":"⁷","8":"⁸","9":"⁹"
    };
    return num.toString().split("").map(n => mapa[n]).join("");
}
function combinacao(n,k){
    let res = 1;
    for(let i=1;i<=k;i++){
        res = res*(n-i+1)/i;
    }
    return res;
}

// 🔄 Atualiza campos
function mudarCampos(){
    let op = document.getElementById("opcao").value;
    let f = document.getElementById("formula");
    let div = document.getElementById("inputs");

    if(op==1){
        
        div.innerHTML = `
        n: <input id="n">
        k: <input id="k">
        Resultado: <input id="res">
        `;
    }

    if(op==2){
      
        div.innerHTML = `n: <input id="n">`;
    }

    if(op==3){
       
        div.innerHTML = `n: <input id="n">`;
    }

    if(op==4){
        
        div.innerHTML = `
        a: <input id="a">
        b: <input id="b">
        n: <input id="n">
        `;
    }

    if(op==5){
       
        div.innerHTML = `
        n: <input id="n">
        k: <input id="k">
        a: <input id="a">
        b: <input id="b">
        T: <input id="T">
        `;
    }

    if(op==6){
       
        div.innerHTML = `
        n: <input id="n">
        k: <input id="k">
        P: <input id="P">
        `;
    }
}function mudarCampos(){
    let op = document.getElementById("opcao").value;
    let f = document.getElementById("formula");
    let div = document.getElementById("inputs");

    if(op==1){
        f.innerHTML = "";
        div.innerHTML = `
        n: <input id="n">
        k: <input id="k">
        `;
    }

    if(op==4){
        f.innerHTML = "";
        div.innerHTML = `
        a: <input id="a">
        b: <input id="b">
        n: <input id="n">
        `;
    }

    if(op==5){
        f.innerHTML = "";
        div.innerHTML = `
        n: <input id="n">
        k: <input id="k">
        a: <input id="a">
        b: <input id="b">
        `;
    }

    if(op==6){
        f.innerHTML = "";
        div.innerHTML = `
        n: <input id="n">
        k: <input id="k">
        `;
    }
}

// 🚀 Cálculo inteligente
function calcular(){
    let op = document.getElementById("opcao").value;
    let out = document.getElementById("saida");

    try{

    // 🔺 COMBINAÇÃO + PASCAL
    if(op==1){
        let n = Number(document.getElementById("n").value);
        let k = Number(document.getElementById("k").value);

        let tri = [];

        for(let i=0;i<=n;i++){
            let linha=[];
            for(let j=0;j<=i;j++){
                if(j==0||j==i) linha.push(1);
                else linha.push(tri[i-1][j-1]+tri[i-1][j]);
            }
            tri.push(linha);
        }

        let html = "<h3>🔺 Triângulo de Pascal</h3>";

        for(let i=0;i<tri.length;i++){
            html += `<div style="text-align:center;">`;
            for(let j=0;j<tri[i].length;j++){
                html += `<span style="display:inline-block;width:40px;font-weight:bold;">${tri[i][j]}</span>`;
            }
            html += `</div>`;
        }

        html += `<h3>📊 Resultado</h3>
        C(${n},${k}) = ${combinacao(n,k)}`;

        html += `
        <h3>🧠 Explicação</h3>
        Usamos combinação porque a ordem não importa.<br><br>
        C(${n},${k}) = ${n}! / (${k}!(${n-k})!)
        `;

        out.innerHTML = `
    <h3>📊 Combinação</h3>

    <p>Vamos calcular:</p>

    <p style="font-size:18px; text-align:center;">
    C(${n},${k})
    </p>

    <h3>🧠 O que é combinação?</h3>

    <p>
    A combinação é usada quando queremos saber quantas formas diferentes
    podemos escolher elementos <b>sem se importar com a ordem</b>.
    </p>

    <h3>📌 Fórmula</h3>

    <div style="font-size:20px; text-align:center; margin:10px;">
    C(n,k) = n! / (k! · (n − k)!)
    </div>

    <h3>📊 Valores usados</h3>

    <ul>
        <li>n = ${n}</li>
        <li>k = ${k}</li>
    </ul>

    <h3>🧮 Passo a passo</h3>

    <p><b>1️⃣ Substituindo na fórmula:</b></p>

    <p>
    C(${n},${k}) = ${n}! / (${k}! · (${n-k})!)
    </p>

    <p><b>2️⃣ Calculando fatoriais:</b></p>

    <p>
    ${n}! = ${fatorial(n)}<br>
    ${k}! = ${fatorial(k)}<br>
    ${n-k}! = ${fatorial(n-k)}
    </p>

    <p><b>3️⃣ Resultado final:</b></p>

    <p style="font-size:18px;">
    C(${n},${k}) = ${resultado}
    </p>
    `;
    }

    // 📐 EXPANSÃO
    if(op==4){
        let a = Number(document.getElementById("a").value);
        let b = Number(document.getElementById("b").value);
        let n = Number(document.getElementById("n").value);

        let tri = [];

        for(let i=0;i<=n;i++){
            let linha=[];
            for(let j=0;j<=i;j++){
                if(j==0||j==i) linha.push(1);
                else linha.push(tri[i-1][j-1]+tri[i-1][j]);
            }
            tri.push(linha);
        }

        let html = "<h3>🔺 Triângulo de Pascal</h3>";

        for(let i=0;i<tri.length;i++){
            html += `<div style="text-align:center;">`;
            for(let j=0;j<tri[i].length;j++){
                let cor = (i==n) ? "#ffcc00" : "black";
                html += `<span style="display:inline-block;width:40px;color:${cor};font-weight:bold;">${tri[i][j]}</span>`;
            }
            html += `</div>`;
        }

        let termos=[];

        for(let k=0;k<=n;k++){
            let coef = tri[n][k]*(a**(n-k))*(b**k);
            let exp = n-k;

            if(exp>1) termos.push(coef+"x"+sup(exp));
            else if(exp==1) termos.push(coef+"x");
            else termos.push(coef);
        }

        html += `<h3>📐 Expansão</h3>${termos.join(" + ")}`;

        html += `
        <h3>🧠 Explicação</h3>
        Linha usada: ${tri[n].join(", ")}
        `;

        out.innerHTML = `
<h3>📐 Expansão Binomial</h3>

<p>Vamos expandir a expressão:</p>

<p style="font-size:18px; text-align:center;">
(${a}x + ${b})<sup>${n}</sup>
</p>

<h3>🧠 Como funciona</h3>

<p>
A expansão binomial transforma a expressão em uma soma de termos.
Cada termo é calculado usando combinação e potências.
</p>

<div style="font-size:20px; text-align:center; margin:10px;">
(a + b)<sup>n</sup> = C(n,k) · a<sup>n-k</sup> · b<sup>k</sup>
</div>

<h4>📊 Valores usados</h4>
<ul>
<li>n = ${n}</li>
<li>a = ${a}</li>
<li>b = ${b}</li>
</ul>

<h3>🔺 Coeficientes (Triângulo de Pascal)</h3>
<p>Linha ${n}: ${tri[n].join(", ")}</p>

<h3>🧮 Passo a passo</h3>
`;

for(let k=0;k<=n;k++){
    let coef = combinacao(n,k);
    let parteA = (a**(n-k));
    let parteB = (b**k);
    let resultadoTermo = coef * parteA * parteB;

    out.innerHTML += `
    <p>
    Termo ${k+1}: 
    C(${n},${k}) · (${a}x)<sup>${n-k}</sup> · ${b}<sup>${k}</sup> 
    = ${coef} · ${parteA}x<sup>${n-k}</sup> · ${parteB}
    = ${resultadoTermo}x<sup>${n-k}</sup>
    </p>
    `;
}

out.innerHTML += `
<h3>🎯 Resultado final</h3>
<p style="font-size:18px;">
${termos.join(" + ")}
</p>
`;
    }

    // 🎯 TERMO GERAL
    if(op==5){
        let n = Number(document.getElementById("n").value);
        let k = Number(document.getElementById("k").value);
        let a = Number(document.getElementById("a").value);
        let b = Number(document.getElementById("b").value);

        let coef = combinacao(n,k)*(a**(n-k))*(b**k);
        let exp = n-k;

        let resultado = exp>1 ? coef+"x"+sup(exp) :
                        exp==1 ? coef+"x" : coef;

        out.innerHTML = `
<h3>🎯 Termo Geral</h3>

<div><b>Fórmula:</b> T = C(n,k) · a<sup>n-k</sup> · b<sup>k</sup></div>

<h3>🧠 Como calcular</h3>

<p>Vamos encontrar o <b>${k+1}º termo</b> de (${a}x + ${b})<sup>${n}</sup></p>

<h4>1️⃣ Identificando os valores</h4>
<ul>
<li>n = ${n}</li>
<li>k = ${k}</li>
<li>a = ${a}</li>
<li>b = ${b}</li>
</ul>

<h4>2️⃣ Aplicando a fórmula</h4>
<p>
T = C(${n},${k}) · (${a}x)<sup>${n-k}</sup> · ${b}<sup>${k}</sup>
</p>

<h4>3️⃣ Calculando cada parte</h4>
<ul>
<li>C(${n},${k}) = ${combinacao(n,k)}</li>
<li>(${a}x)<sup>${n-k}</sup> = ${(a**(n-k))}x<sup>${n-k}</sup></li>
<li>${b}<sup>${k}</sup> = ${(b**k)}</li>
</ul>

<h4>4️⃣ Resultado final</h4>
<p style="font-size:18px;">
T = ${resultado}
</p>

<h3>💡 Interpretação</h3>
<p>
Este é o ${k+1}º termo da expansão, onde o expoente de x é ${n-k}.
</p>
`;
    }

    // 📊 PROBABILIDADE
    if(op==6){
        let n = Number(document.getElementById("n").value);
        let k = Number(document.getElementById("k").value);

        let prob = combinacao(n,k)*(0.5**n)*100;

        out.innerHTML = `
    <h3>📊 Resultado</h3>
    <p style="font-size:18px;">P = ${prob.toFixed(2)}%</p>

    <h3>🧠 Probabilidade Binomial – Explicação</h3>

    <p>
    A probabilidade binomial é usada quando repetimos um experimento várias vezes,
    com apenas dois resultados possíveis (como cara ou coroa).
    </p>

    <div style="font-size:20px; text-align:center; margin:10px;">
    P = C(n,k) · p<sup>k</sup> · (1 − p)<sup>${n-k}</sup>
    </div>

    <p><b>Valores usados:</b></p>
    <ul>
        <li>n = ${n}</li>
        <li>k = ${k}</li>
        <li>p = ${p}</li>
    </ul>

    <h4>🧮 Passo a passo</h4>

    <p><b>1️⃣ Combinação:</b></p>
    <p>C(${n},${k}) = ${combinacao(n,k)}</p>

    <p><b>2️⃣ Probabilidade de sucesso:</b></p>
    <p>${p}<sup>${k}</sup> = ${(p**k).toFixed(4)}</p>

    <p><b>3️⃣ Probabilidade de fracasso:</b></p>
    <p>(1 − ${p})<sup>${n-k}</sup> = ${((1-p)**(n-k)).toFixed(4)}</p>

    <p><b>4️⃣ Resultado final:</b></p>
    <p style="font-size:18px;">
    P = ${combinacao(n,k)} × ${(p**k).toFixed(4)} × ${((1-p)**(n-k)).toFixed(4)}
    = ${prob.toFixed(2)}%
    </p>
    `;
    }

    } catch(e){
        out.innerHTML = "Erro nos dados!";
    }
}
mudarCampos();
</script>

</body>
</html>
