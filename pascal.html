<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Calculadora Binomial Avançada</title>
<style>
    body { font-family: Arial; text-align: center; background: #f4f4f4; }
    input, select, button { padding: 8px; margin: 5px; }
    .box { margin: 15px; }
</style>
</head>
<body>

<h1> Calculadora Binomial</h1>

<select id="opcao" onchange="mudarCampos()">
    <option value="1">Combinação </option>
    <option value="4">Expansão </option>
    <option value="5">Termo Geral</option>
    <option value="6">Probabilidade</option>
</select>

<div id="formula" class="box"></div>
<div id="inputs" class="box"></div>

<button onclick="calcular()">Calcular</button>

<h2 id="saida"></h2>

<script>

function sup(num){
    const mapa = {
        "0":"⁰","1":"¹","2":"²","3":"³","4":"⁴",
        "5":"⁵","6":"⁶","7":"⁷","8":"⁸","9":"⁹"
    };
    return num.toString().split("").map(n => mapa[n]).join("");
}
function combinacao(n,k){
    let res = 1;
    for(let i=1;i<=k;i++){
        res = res*(n-i+1)/i;
    }
    return res;
}

// 🔄 Atualiza campos
function mudarCampos(){
    let op = document.getElementById("opcao").value;
    let f = document.getElementById("formula");
    let div = document.getElementById("inputs");

    if(op==1){
        f.innerHTML = "C(n,k) = n! / (k!(n-k)!)";
        div.innerHTML = `
        n: <input id="n">
        k: <input id="k">
        Resultado: <input id="res">
        `;
    }

    if(op==2){
        f.innerHTML = "Triângulo de Pascal";
        div.innerHTML = `n: <input id="n">`;
    }

    if(op==3){
        f.innerHTML = "(x+1)^n";
        div.innerHTML = `n: <input id="n">`;
    }

    if(op==4){
        f.innerHTML = "(ax+b)^n";
        div.innerHTML = `
        a: <input id="a">
        b: <input id="b">
        n: <input id="n">
        `;
    }

    if(op==5){
        f.innerHTML = "T = C(n,k)·a⁽ⁿ⁻ᵏ⁾·bᵏ";
        div.innerHTML = `
        n: <input id="n">
        k: <input id="k">
        a: <input id="a">
        b: <input id="b">
        T: <input id="T">
        `;
    }

    if(op==6){
        f.innerHTML = "P = C(n,k)·(1/2)^n";
        div.innerHTML = `
        n: <input id="n">
        k: <input id="k">
        P: <input id="P">
        `;
    }
}function mudarCampos(){
    let op = document.getElementById("opcao").value;
    let f = document.getElementById("formula");
    let div = document.getElementById("inputs");

    if(op==1){
        f.innerHTML = "";
        div.innerHTML = `
        n: <input id="n">
        k: <input id="k">
        `;
    }

    if(op==4){
        f.innerHTML = "";
        div.innerHTML = `
        a: <input id="a">
        b: <input id="b">
        n: <input id="n">
        `;
    }

    if(op==5){
        f.innerHTML = "";
        div.innerHTML = `
        n: <input id="n">
        k: <input id="k">
        a: <input id="a">
        b: <input id="b">
        `;
    }

    if(op==6){
        f.innerHTML = "";
        div.innerHTML = `
        n: <input id="n">
        k: <input id="k">
        `;
    }
}

// 🚀 Cálculo inteligente
function calcular(){
    let op = document.getElementById("opcao").value;
    let out = document.getElementById("saida");

    function combinacao(n,k){
        let res = 1;
        for(let i=1;i<=k;i++){
            res = res*(n-i+1)/i;
        }
        return res;
    }

    try{

    // 🔺 Combinação + Pascal
   if(op==1){
    let n = +document.getElementById("n").value;
    let k = +document.getElementById("k").value;

    let tri = [];

    for(let i=0;i<=n;i++){
        let linha=[];
        for(let j=0;j<=i;j++){
            if(j==0||j==i) linha.push(1);
            else linha.push(tri[i-1][j-1]+tri[i-1][j]);
        }
        tri.push(linha);
    }

    // 🔺 TRIÂNGULO BONITO
    let html = "<h3>🔺 Triângulo de Pascal</h3>";

    for(let i=0;i<tri.length;i++){
        html += `<div style="text-align:center;">`;
        for(let j=0;j<tri[i].length;j++){
            html += `<span style="
                display:inline-block;
                width:40px;
                font-weight:bold;
            ">${tri[i][j]}</span>`;
        }
        html += `</div>`;
    }

    // 📐 EXPANSÃO
    html += "<h3>📐 Expansão</h3>";

    let termos = [];

    for(let k=0;k<=n;k++){
        let coef = combinacao(n,k);
        let exp = n-k;

        if(exp > 1) termos.push(coef + "x" + sup(exp));
        else if(exp == 1) termos.push(coef + "x");
        else termos.push(coef);
    }

    html += `<div>${termos.join(" + ")}</div>`;

    // 📊 COMBINAÇÃO
    html += `<h3>📊 Resultado</h3>`;
    html += `<div>C(${n},${k}) = ${combinacao(n,k)}</div>`;

    out.innerHTML = html;
} if(op==1){
        let n = +document.getElementById("n").value;
        let k = +document.getElementById("k").value;

        let tri = [];

        for(let i=0;i<=n;i++){
            let linha=[];
            for(let j=0;j<=i;j++){
                if(j==0||j==i) linha.push(1);
                else linha.push(tri[i-1][j-1]+tri[i-1][j]);
            }
            tri.push(linha);
        }

        let txt = "Triângulo de Pascal:\n\n";

        for(let i=0;i<tri.length;i++){
            txt += " ".repeat(n-i) + tri[i].join(" ") + "\n";
        }

        txt += "\nC(" + n + "," + k + ") = " + combinacao(n,k);

        out.innerText = txt;
    }

    // 📐 Expansão (ax+b)^n
  if(op==4){
    let a = +document.getElementById("a").value;
    let b = +document.getElementById("b").value;
    let n = +document.getElementById("n").value;

    // 🔺 Gerar triângulo
    let tri = [];

    for(let i=0;i<=n;i++){
        let linha=[];
        for(let j=0;j<=i;j++){
            if(j==0||j==i) linha.push(1);
            else linha.push(tri[i-1][j-1]+tri[i-1][j]);
        }
        tri.push(linha);
    }

    let html = "<h3>🔺 Triângulo de Pascal</h3>";

    // 🔺 Mostrar triângulo (destacar linha n)
    for(let i=0;i<tri.length;i++){
        html += `<div style="text-align:center;">`;

        for(let j=0;j<tri[i].length;j++){
            let cor = (i == n) ? "#ffcc00" : "black";

            html += `<span style="
                display:inline-block;
                width:40px;
                font-weight:bold;
                color:${cor};
            ">${tri[i][j]}</span>`;
        }

        html += `</div>`;
    }

    // 📐 Expansão
    html += "<h3>📐 Expansão</h3>";

    let termos = [];

    for(let k=0;k<=n;k++){
        let coef = tri[n][k] * (a**(n-k)) * (b**k);
        let exp = n-k;

        if(exp > 1) termos.push(coef + "x" + sup(exp));
        else if(exp == 1) termos.push(coef + "x");
        else termos.push(coef);
    }

    html += `<div style="margin-top:10px; font-size:18px;">
        ${termos.join(" + ")}
    </div>`;

    out.innerHTML = html;
}

    // 🎯 Termo Geral
 if(op==5){
    let n = document.getElementById("n").value;
    let k = document.getElementById("k").value;
    let a = document.getElementById("a").value;
    let b = document.getElementById("b").value;

    // 🔒 Verificação
    if(n === "" || k === "" || a === "" || b === ""){
        out.innerHTML = "Preencha todos os valores!";
        return;
    }

    n = Number(n);
    k = Number(k);
    a = Number(a);
    b = Number(b);

    if(k > n){
        out.innerHTML = "Erro: k não pode ser maior que n";
        return;
    }

    let coef = combinacao(n,k) * (a ** (n-k)) * (b ** k);
    let exp = n - k;

    let resultado = "";

    // 🎯 FORMATAÇÃO BONITA
    if(exp > 1){
        resultado = coef + "x" + sup(exp);
    } else if(exp == 1){
        resultado = coef + "x";
    } else {
        resultado = coef;
    }

    // ✨ Mostrar completo
    out.innerHTML = `
        <h3> Termo Geral</h3>
        <div><b>Fórmula:</b> T = C(n,k)·a⁽ⁿ⁻ᵏ⁾·bᵏ</div>
        <div><b>Substituindo:</b> T = C(${n},${k}) · ${a}<sup>${n-k}</sup> · ${b}<sup>${k}</sup></div>
        <div style="margin-top:10px;"><b>Resultado:</b> ${resultado}</div>
    `;
}

    // 📊 Probabilidade (%)
    if(op==6){
        let n = +document.getElementById("n").value;
        let k = +document.getElementById("k").value;

        let prob = combinacao(n,k)*(0.5**n)*100;

        out.innerText = "P = " + prob.toFixed(2) + "%";
    }

    } catch(e){
        out.innerText = "Erro nos dados!";
    }
}

mudarCampos();
</script>

</body>
</html>
